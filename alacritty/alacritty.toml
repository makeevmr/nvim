[scrolling]
history = 50000
multiplier = 3

[window]
decorations = "full"
opacity = 1.0

[window.dimensions]
columns = 80
lines = 30

[env]
TERM = "xterm-256color"
COLORTERM = "truecolor"

[window.padding]
x = 0
y = 0

[selection]
save_to_clipboard = true
