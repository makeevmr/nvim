live_config_reload = true
import = ["~/.dotfiles/alacritty/colors.toml"]

[env]
TERM = "xterm-256color"
COLORTERM = "truecolor"

[window]
decorations = "Full"
opacity = 1.0
startup_mode = "Maximized"

[window.dimensions]
columns = 80
lines = 30

[window.padding]
x = 0
y = 0

[scrolling]
history = 50000
multiplier = 3

[font]
size = 9
builtin_box_drawing = false

[font.normal]
family = "JetBrainsMonoNerdFont"
style = "Regular"

[font.bold]
family = "JetBrainsMonoNerdFont"
style = "Bold"

[font.bold_italic]
family = "JetBrainsMonoNerdFont"
style = "Bold Italic"

[font.offset]
x = 0
y = 0

[font.glyph_offset]
x = 0
y = 0

[selection]
save_to_clipboard = true
